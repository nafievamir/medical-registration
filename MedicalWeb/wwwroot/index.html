<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Медицинская регистратура</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card h2 { color: #667eea; margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #667eea; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #5a67d8; }
        .list-item { background: #f8f9fa; padding: 10px; margin: 8px 0; border-radius: 8px; border-left: 4px solid #667eea; }
        .list-item strong { color: #333; }
        .log { background: #1e1e1e; color: #0f0; padding: 10px; border-radius: 8px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .log .error { color: #ff6b6b; }
        .log .success { color: #51cf66; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Медицинская регистратура</h1>
        <div class="grid">
            <!-- Врачи -->
            <div class="card">
                <h2>👨‍⚕️ Врачи</h2>
                <input type="text" id="docName" placeholder="ФИО врача">
                <input type="text" id="docSpecialty" placeholder="Специальность">
                <button onclick="createDoctor()">➕ Добавить врача</button>
                <button onclick="loadDoctors()" style="background:#6c757d">🔄 Обновить</button>
                <div id="doctorsList"></div>
            </div>

            <!-- Слоты -->
            <div class="card">
                <h2>📅 Слоты</h2>
                <select id="slotDoctorId"><option value="">Выберите врача</option></select>
                <input type="text" id="slotTime" placeholder="Время (например 10:00)">
                <button onclick="addSlot()">➕ Добавить слот</button>
                <div id="slotsList"></div>
            </div>

            <!-- Записи -->
            <div class="card">
                <h2>📝 Записи</h2>
                <input type="number" id="appPatientId" placeholder="ID пациента">
                <select id="appDoctorId"><option value="">Выберите врача</option></select>
                <input type="datetime-local" id="appDatetime">
                <button onclick="createAppointment()">✅ Создать запись</button>
                <div id="appointmentsList"></div>
            </div>
        </div>

        <div class="card">
            <h2>📡 Логи интеграции</h2>
            <div id="log" class="log">🚀 Система готова к работе</div>
            <button onclick="clearLogs()" style="width:auto; margin-top:10px; background:#6c757d">🗑 Очистить логи</button>
        </div>
    </div>

    <script>
        let doctors = [];

        function addLog(msg, isError = false) {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<div class="${isError ? 'error' : 'success'}">[${time}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        function clearLogs() { document.getElementById('log').innerHTML = ''; addLog('Логи очищены'); }

        function updateDoctorSelects() {
            const slotSelect = document.getElementById('slotDoctorId');
            const appSelect = document.getElementById('appDoctorId');
            slotSelect.innerHTML = '<option value="">Выберите врача</option>';
            appSelect.innerHTML = '<option value="">Выберите врача</option>';
            doctors.forEach(d => {
                slotSelect.innerHTML += `<option value="${d.id}">${d.name} (${d.specialty})</option>`;
                appSelect.innerHTML += `<option value="${d.id}">${d.name} (${d.specialty})</option>`;
            });
        }

        async function loadDoctors() {
            try {
                const res = await fetch('/api/doctors');
                doctors = await res.json();
                updateDoctorSelects();
                if (doctors.length === 0) document.getElementById('doctorsList').innerHTML = '<div class="list-item">Нет врачей</div>';
                else document.getElementById('doctorsList').innerHTML = doctors.map(d => `<div class="list-item"><strong>${d.name}</strong> — ${d.specialty} <span style="float:right">ID: ${d.id}</span></div>`).join('');
                addLog(`Загружено врачей: ${doctors.length}`);
            } catch(e) { addLog(`Ошибка: ${e.message}`, true); }
        }

        async function createDoctor() {
            const name = document.getElementById('docName').value;
            const specialty = document.getElementById('docSpecialty').value;
            if (!name || !specialty) { addLog('Заполните ФИО и специальность', true); return; }
            try {
                const res = await fetch('/api/doctors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, specialty })
                });
                const data = await res.json();
                addLog(`Врач создан! ID: ${data.id}, ${data.name}`);
                document.getElementById('docName').value = '';
                document.getElementById('docSpecialty').value = '';
                loadDoctors();
            } catch(e) { addLog(`Ошибка: ${e.message}`, true); }
        }

        async function addSlot() {
            const doctor_id = document.getElementById('slotDoctorId').value;
            const time = document.getElementById('slotTime').value;
            if (!doctor_id || !time) { addLog('Выберите врача и укажите время', true); return; }
            try {
                const res = await fetch('/api/schedule/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doctorId: parseInt(doctor_id), time })
                });
                await res.json();
                const doctor = doctors.find(d => d.id == doctor_id);
                addLog(`Слот добавлен: врач ${doctor?.name}, время ${time}`);
                document.getElementById('slotTime').value = '';
                loadSlots();
            } catch(e) { addLog(`Ошибка: ${e.message}`, true); }
        }

        async function loadSlots() {
            try {
                const res = await fetch('/api/slots');
                const slots = await res.json();
                if (slots.length === 0) document.getElementById('slotsList').innerHTML = '<div class="list-item">Нет слотов</div>';
                else document.getElementById('slotsList').innerHTML = slots.map(s => {
                    const doctor = doctors.find(d => d.id == s.doctorId);
                    return `<div class="list-item"><strong>${doctor?.name || 'Врач ID:'+s.doctorId}</strong> — Время: ${s.time} <span style="float:right">ID слота: ${s.id}</span></div>`;
                }).join('');
            } catch(e) { console.log(e); }
        }

        async function createAppointment() {
            const patient_id = document.getElementById('appPatientId').value;
            const doctor_id = document.getElementById('appDoctorId').value;
            const datetime = document.getElementById('appDatetime').value;
            if (!patient_id || !doctor_id || !datetime) { addLog('Заполните все поля', true); return; }
            try {
                const res = await fetch('/api/appointment/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patientId: parseInt(patient_id), doctorId: parseInt(doctor_id), dateTime: datetime })
                });
                const data = await res.json();
                if (res.ok) {
                    const doctor = doctors.find(d => d.id == doctor_id);
                    addLog(`Запись создана! Пациент ${patient_id} → врач ${doctor?.name}`);
                } else addLog(`Ошибка: ${data.error}`, true);
                loadAppointments();
            } catch(e) { addLog(`Ошибка: ${e.message}`, true); }
        }

        async function loadAppointments() {
            try {
                const res = await fetch('/api/appointments');
                const appointments = await res.json();
                if (appointments.length === 0) document.getElementById('appointmentsList').innerHTML = '<div class="list-item">Нет записей</div>';
                else document.getElementById('appointmentsList').innerHTML = appointments.map(a => {
                    const doctor = doctors.find(d => d.id == a.doctorId);
                    return `<div class="list-item"><strong>Пациент ID: ${a.patientId}</strong> → Врач: ${doctor?.name || 'ID:'+a.doctorId}<br>📅 ${a.dateTime} <span style="float:right">Статус: ${a.status}</span></div>`;
                }).join('');
            } catch(e) { console.log(e); }
        }

        loadDoctors();
        loadSlots();
        loadAppointments();
        setInterval(loadDoctors, 5000);
    </script>
</body>
</html>
