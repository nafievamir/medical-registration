name: CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      
      - name: Restore & Build MedicalWeb
        run: |
          cd MedicalWeb
          dotnet restore
          dotnet build --no-restore
      
      - name: Restore & Build MedicalWeb.Tests
        run: |
          cd MedicalWeb.Tests
          dotnet restore
          dotnet build --no-restore
      
      - name: Run Unit Tests
        run: |
          cd MedicalWeb.Tests
          dotnet test --filter "FullyQualifiedName~UnitTests"
      
      - name: Start MedicalWeb server (background)
        run: |
          cd MedicalWeb
          dotnet run --urls "http://localhost:5167" &
          sleep 10
      
      - name: Run Integration Tests
        run: |
          cd MedicalWeb.Tests
          dotnet test --filter "FullyQualifiedName~SimpleIntegrationTests"
      
      - name: Run E2E Tests
        run: |
          cd MedicalWeb.Tests
          dotnet test --filter "FullyQualifiedName~E2ETests"
