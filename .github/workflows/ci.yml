name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0

    - name: Restore dependencies
      run: dotnet restore MedicalWeb/MedicalWeb.csproj

    - name: Build
      run: dotnet build MedicalWeb/MedicalWeb.csproj --no-restore

    - name: Run Unit Tests
      run: dotnet test MedicalWeb.Tests/MedicalWeb.Tests.csproj --filter "FullyQualifiedName~UnitTests" --verbosity normal

    - name: Run Integration Tests
      run: dotnet test MedicalWeb.Tests/MedicalWeb.Tests.csproj --filter "FullyQualifiedName~SimpleIntegrationTests" --verbosity normal

    - name: Run E2E Tests (requires running app)
      run: |
        cd MedicalWeb
        dotnet run &
        sleep 10
        cd ../MedicalWeb.Tests
        dotnet test --filter "FullyQualifiedName~E2ETests" --verbosity normal
