name: CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      
      - name: Restore & Build
        run: |
          dotnet restore MedicalWeb
          dotnet build MedicalWeb --no-restore
      
      - name: Run Unit Tests
        run: dotnet test MedicalWeb.Tests --filter "FullyQualifiedName~UnitTests"
      
      - name: Run Integration Tests
        run: dotnet test MedicalWeb.Tests --filter "FullyQualifiedName~SimpleIntegrationTests"
