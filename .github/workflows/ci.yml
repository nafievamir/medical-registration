name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          pip install flask flake8

      - name: Lint Python (flake8)
        run: |
          flake8 *.py --max-line-length=120 --exit-zero || true

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.doctors -t doctors:latest .
          docker build -f Dockerfile.schedule -t schedule:latest .
          docker build -f Dockerfile.appointment -t appointment:latest .

      - name: Run containers with docker compose
        run: |
          docker compose up -d
          sleep 5

      - name: Test doctors service
        run: |
          curl -f http://localhost:5001/doctors || echo "Doctors service not responding"

      - name: Test schedule service
        run: |
          curl -f http://localhost:5002/schedule || echo "Schedule service not responding"

      - name: Test appointment service
        run: |
          curl -f -X POST http://localhost:3000/appointment/create \
            -H "Content-Type: application/json" \
            -d '{"patient_id":1,"doctor_id":1,"datetime":"2025-06-07T10:00:00"}' || echo "Appointment service not responding"

      - name: Show logs
        if: always()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down
