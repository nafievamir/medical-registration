name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          pip install flask

      - name: Install Node dependencies
        run: |
          cd /home/runner/work/medical-registration/medical-registration
          npm install || true

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 *.py --max-line-length=120 || true

      - name: Run Docker Compose
        run: |
          docker-compose up -d
          sleep 5

      - name: Test doctors service
        run: |
          curl -f http://localhost:5001/doctors || echo "Doctors service not responding"

      - name: Test schedule service
        run: |
          curl -f http://localhost:5002/schedule || echo "Schedule service not responding"

      - name: Test appointment service
        run: |
          curl -f -X POST http://localhost:3000/appointment/create \
            -H "Content-Type: application/json" \
            -d '{"patient_id":1,"doctor_id":1,"datetime":"2025-06-07T10:00:00"}' || echo "Appointment service not responding"

      - name: Docker Compose logs
        if: always()
        run: docker-compose logs

      - name: Stop Docker Compose
        if: always()
        run: docker-compose down
